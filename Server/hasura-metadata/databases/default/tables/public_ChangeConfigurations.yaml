table:
  name: ChangeConfigurations
  schema: public
object_relationships:
  - name: Tenant
    using:
      foreign_key_constraint_on: tenantId
insert_permissions:
  - role: user
    permission:
      columns:
        - readonly
        - key
        - stationId
        - value
        - id
        - createdAt
        - updatedAt
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
select_permissions:
  - role: user
    permission:
      columns:
        - readonly
        - key
        - stationId
        - value
        - id
        - createdAt
        - updatedAt
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
      allow_aggregations: true
update_permissions:
  - role: user
    permission:
      columns:
        - readonly
        - key
        - stationId
        - value
        - id
        - createdAt
        - updatedAt
      filter:
        tenantId:
          _eq: x-hasura-tenant-id
delete_permissions:
  - role: user
    permission:
      filter:
        tenantId:
          _eq: x-hasura-tenant-id